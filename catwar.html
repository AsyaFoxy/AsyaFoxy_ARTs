    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Модальное окно
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            const closeModal = document.querySelector('.close-modal');
            
            const imageContainers = document.querySelectorAll('.card-image');
            imageContainers.forEach(container => {
                container.style.cursor = 'pointer';
                container.addEventListener('click', function(e) {
                    e.stopPropagation();
                    let imgSrc = this.getAttribute('data-img');
                    if (!imgSrc) {
                        const img = this.querySelector('img');
                        if (img) imgSrc = img.src;
                    }
                    if (imgSrc) {
                        modal.style.display = 'flex';
                        modalImg.src = imgSrc;
                    }
                });
            });
            
            if (closeModal) {
                closeModal.addEventListener('click', function() {
                    modal.style.display = 'none';
                });
            }
            
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });
            
            // Переключение вкладок CatWar
            const tabBtns = document.querySelectorAll('.main-tabs .tab-btn');
            const sections = {
                new: document.getElementById('new'),
                old: document.getElementById('old')
            };
            
            tabBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabId = this.getAttribute('data-tab');
                    
                    tabBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    Object.values(sections).forEach(section => {
                        if (section) section.classList.remove('active');
                    });
                    
                    if (sections[tabId]) {
                        sections[tabId].classList.add('active');
                    }
                });
            });
        });
    </script>
