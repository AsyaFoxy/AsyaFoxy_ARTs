<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Майнкрафт</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="page-title-header">
                <span class="title-star-left">✦</span>
                <h1>Minecraft</h1>
                <span class="title-star-right">✦</span>
            </div>
        </div>
        <nav>
            <a href="price.html" class="price-btn"><i class="fas fa-tags"></i> Прайс-лист</a>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> Главная</a>
                <a href="gallery.html"><i class="fas fa-palette"></i> Иллюстрации</a>
                <a href="minecraft.html" class="active"><i class="fas fa-cube"></i> Minecraft</a>
                <a href="catwar.html"><i class="fas fa-cat"></i> CatWar</a>
            </div>
        </nav>
    </header>

    <main>        
        <div class="category">
            <h3>Скины</h3>
            <div class="gallery">
                <div class="card">
                    <div class="card-image" data-img="https://via.placeholder.com/400x400?text=Skin+1">
                        <img src="https://via.placeholder.com/400x400?text=Skin+1" alt="Skin 1">
                        <div class="card-overlay"><i class="fas fa-search-plus"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <h3>Модели</h3>
            <div class="gallery">
                <div class="card">
                    <div class="card-image" data-img="https://via.placeholder.com/400x400?text=Player+1">
                        <img src="https://via.placeholder.com/400x400?text=Player+1" alt="Player 1">
                        <div class="card-overlay"><i class="fas fa-search-plus"></i></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-image" data-img="https://via.placeholder.com/400x400?text=Player+2">
                        <img src="https://via.placeholder.com/400x400?text=Player+2" alt="Player 2">
                        <div class="card-overlay"><i class="fas fa-search-plus"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <h3>Блоки</h3>
            <div class="gallery">
                <div class="card">
                    <div class="card-image" data-img="https://via.placeholder.com/400x400?text=Item+1">
                        <img src="https://via.placeholder.com/400x400?text=Item+1" alt="Item 1">
                        <div class="card-overlay"><i class="fas fa-search-plus"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="info-block minecraft-info glow-effect">
            <h3><i class="fas fa-info-circle"></i> Информация</h3>
            <ul>
                <li><i class="fas fa-palette"></i> Делаю: скины, модели игроков, мобов, предметов, блоков</li>
                <li><i class="fas fa-cube"></i> Модели создаются в <strong>Blockbench</strong></li>
                <li><i class="fas fa-child"></i> Модели игроков анимируются в моде <strong>CPM</strong></li>
            </ul>
        </div>
    </main>

    <footer>
    <div class="social-icons">
        <a href="https://vk.com/club159753129" target="_blank" class="social-link vk" aria-label="ВКонтакте">
            <i class="fab fa-vk"></i>
            <span>VK</span>
        </a>
        <a href="https://t.me/AsyaF0xy" target="_blank" class="social-link telegram" aria-label="Telegram">
            <i class="fab fa-telegram-plane"></i>
            <span>Telegram</span>
        </a>
        <a href="https://catwar.su/cat954921" target="_blank" class="social-link catwar" aria-label="CatWar">
            <i class="fas fa-cat"></i>
            <span>CatWar</span>
        </a>
    </div>
</footer>

    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            const closeModal = document.querySelector('.close-modal');
            
            const imageContainers = document.querySelectorAll('.card-image');
            imageContainers.forEach(container => {
                container.style.cursor = 'pointer';
                container.addEventListener('click', function(e) {
                    e.stopPropagation();
                    let imgSrc = this.getAttribute('data-img');
                    if (!imgSrc) {
                        const img = this.querySelector('img');
                        if (img) imgSrc = img.src;
                    }
                    if (imgSrc) {
                        modal.style.display = 'flex';
                        modalImg.src = imgSrc;
                    }
                });
            });
            
            if (closeModal) {
                closeModal.addEventListener('click', function() {
                    modal.style.display = 'none';
                });
            }
            
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
