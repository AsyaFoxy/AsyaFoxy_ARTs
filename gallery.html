    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="page-title-header">
                <h1>Иллюстрации</h1>
            </div>
        </div>
        <nav>
            <a href="price.html" class="price-btn"><i class="fas fa-tags"></i> Прайс-лист</a>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> Главная</a>
                <a href="gallery.html" class="active"><i class="fas fa-palette"></i> Иллюстрации</a>
                <a href="minecraft.html"><i class="fas fa-cube"></i> Minecraft</a>
                <a href="catwar.html"><i class="fas fa-cat"></i> CatWar</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="category">
            <h3>Лайн</h3>
            <div class="gallery">
                <div class="card"><div class="card-image"><img src="images/fullbody_1.jpg" alt="Fullbody 1"><div class="card-overlay"><i class="fas fa-search-plus"></i></div></div></div>
                <div class="card"><div class="card-image"><img src="images/fullbody_2.jpg" alt="Fullbody 2"><div class="card-overlay"><i class="fas fa-search-plus"></i></div></div></div>
                <div class="card"><div class="card-image"><img src="images/fullbody_3.jpg" alt="Fullbody 3"><div class="card-overlay"><i class="fas fa-search-plus"></i></div></div></div>
                <div class="card"><div class="card-image"><img src="images/fullbody_4.jpg" alt="Fullbody 4"><div class="card-overlay"><i class="fas fa-search-plus"></i></div></div></div>
                <div class="card"><div class="card-image"><img src="images/fullbody_5.jpg" alt="Fullbody 5"><div class="card-overlay"><i class="fas fa-search-plus"></i></div></div></div>
                <div class="card"><div class="card-image"><img src="images/fullbody_6.png" alt="Fullbody 6"><div class="card-overlay"><i class="fas fa-search-plus"></i></div></div></div>
                <div class="card"><div class="card-image"><img src="images/fullbody_7.jpg" alt="Fullbody 7"><div class="card-overlay"><i class="fas fa-search-plus"></i></div></div></div>
                <div class="card"><div class="card-image"><img src="images/fullbody_8.png" alt="Fullbody 8"><div class="card-overlay"><i class="fas fa-search-plus"></i></div></div></div>
                <div class="card"><div class="card-image"><img src="images/half_1.jpg" alt="Half 1"><div class="card-overlay"><i class="fas fa-search-plus"></i></div></div></div>
                <div class="card"><div class="card-image"><img src="images/reference_1.png" alt="Reference 1"><div class="card-overlay"><i class="fas fa-search-plus"></i></div></div></div>
                <div class="card"><div class="card-image"><img src="images/reference_2.png" alt="Reference 2"><div class="card-overlay"><i class="fas fa-search-plus"></i></div></div></div>
                <div class="card"><div class="card-image"><img src="images/reference_3.png" alt="Reference 3"><div class="card-overlay"><i class="fas fa-search-plus"></i></div></div></div>
                <div class="card"><div class="card-image"><img src="images/reference_4.png" alt="Reference 4"><div class="card-overlay"><i class="fas fa-search-plus"></i></div></div></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="social-icons">
            <a href="https://vk.com/club159753129" target="_blank" class="social-link vk" aria-label="ВКонтакте">
                <i class="fab fa-vk"></i>
                <span>VK</span>
            </a>
            <a href="https://t.me/AsyaF0xy" target="_blank" class="social-link telegram" aria-label="Telegram">
                <i class="fab fa-telegram-plane"></i>
                <span>Telegram</span>
            </a>
        </div>
    </footer>

    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const closeModal = document.querySelector('.close-modal');
        
        document.querySelectorAll('.card-image img').forEach(img => {
            img.addEventListener('click', () => {
                modal.style.display = 'flex';
                modalImg.src = img.src;
                modalImg.alt = img.alt;
            });
        });
        
        closeModal.addEventListener('click', () => {
            modal.style.display = 'none';
        });
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
